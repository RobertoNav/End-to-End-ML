name: MLOps Pipeline

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest tests/test_train.py -v

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      endpoint_ip: ${{ steps.tf.outputs.endpoint_ip }}
      instance_id: ${{ steps.tf.outputs.instance_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: terraform -chdir=infra init

      - name: Terraform Apply
        id: tf
        run: |
          terraform -chdir=infra apply -auto-approve -replace=aws_instance.mlops_server
          echo "endpoint_ip=$(terraform -chdir=infra output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"
          echo "instance_id=$(terraform -chdir=infra output -raw ec2_instance_id)" >> "$GITHUB_OUTPUT"

  validate:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Wait for EC2 instance checks
        run: |
          INSTANCE_ID="${{ needs.deploy.outputs.instance_id }}"
          echo "Waiting for EC2 instance ${INSTANCE_ID} to pass AWS status checks"
          aws ec2 wait instance-status-ok --instance-ids "${INSTANCE_ID}"
          aws ec2 describe-instances \
            --instance-ids "${INSTANCE_ID}" \
            --query 'Reservations[0].Instances[0].{State:State.Name,PublicIp:PublicIpAddress,LaunchTime:LaunchTime}' \
            --output table

      - name: Wait for API health endpoint
        run: |
          ENDPOINT_IP="${{ needs.deploy.outputs.endpoint_ip }}"
          echo "Waiting for API at http://${ENDPOINT_IP}:8000/health"

          for i in {1..60}; do
            RESPONSE=$(curl -sS --connect-timeout 5 --max-time 10 -w "\n%{http_code}" \
              -X GET "http://${ENDPOINT_IP}:8000/health" || true)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | sed '$d')

            if [ "$HTTP_CODE" = "200" ]; then
              echo "API is healthy. Body: $BODY"
              exit 0
            fi

            echo "Attempt $i/60: API not ready yet (HTTP: ${HTTP_CODE:-N/A})"
            sleep 15
          done

          echo "API did not become healthy in time"
          exit 1

      - name: Smoke test - verify /predict endpoint
        run: |
          ENDPOINT_IP="${{ needs.deploy.outputs.endpoint_ip }}"
          echo "Testing endpoint at http://${ENDPOINT_IP}:8000/predict"

          RESPONSE=$(curl -sS --connect-timeout 5 --max-time 10 -w "\n%{http_code}" -X POST \
            "http://${ENDPOINT_IP}:8000/predict" \
            -H "Content-Type: application/json" \
            -d '{"features": [8.3, 41.0, 6.98, 1.02, 322.0, 2.56, 37.88, -122.23]}')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed: Expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi

          echo "Smoke test passed!"

      - name: Smoke test - verify /health endpoint
        run: |
          ENDPOINT_IP="${{ needs.deploy.outputs.endpoint_ip }}"
          echo "Testing health endpoint at http://${ENDPOINT_IP}:8000/health"

          RESPONSE=$(curl -sS --connect-timeout 5 --max-time 10 -w "\n%{http_code}" -X GET \
            "http://${ENDPOINT_IP}:8000/health")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed: Expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi

          echo "Health check passed!"

      - name: Capture EC2 diagnostics on failure
        if: failure()
        run: |
          INSTANCE_ID="${{ needs.deploy.outputs.instance_id }}"
          echo "Instance diagnostics for ${INSTANCE_ID}"
          aws ec2 describe-instance-status \
            --include-all-instances \
            --instance-ids "${INSTANCE_ID}" \
            --output table || true
          aws ec2 get-console-output \
            --instance-id "${INSTANCE_ID}" \
            --latest \
            --output text || true
