name: MLOps Pipeline

on:
  push:
    branches: [main]

jobs:
  # Stage 1: Continuous Integration (CI)
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings (adjust threshold as needed)
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests
        run: |
          pytest tests/test_train.py -v

  # Stage 2: Infrastructure Provisioning (CD)
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      endpoint_ip: ${{ steps.tf.outputs.endpoint_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        id: init
        run: |
          cd infra
          terraform init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Terraform Apply
        id: tf
        run: |
          cd infra
          terraform apply -auto-approve
          echo "endpoint_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

  # Stage 3: Validation (Smoke Test)
  validate:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Wait for EC2 instance bootstrap
        run: |
          echo "Waiting 120 seconds for EC2 instance to complete bootstrap..."
          sleep 120

      - name: Smoke test - verify /predict endpoint
        run: |
          ENDPOINT_IP="${{ needs.deploy.outputs.endpoint_ip }}"
          echo "Testing endpoint at http://${ENDPOINT_IP}:8000/predict"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "http://${ENDPOINT_IP}:8000/predict" \
            -H "Content-Type: application/json" \
            -d '{"features": [8.3, 41.0, 6.98, 1.02, 322.0, 2.56, 37.88, -122.23]}')
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed: Expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi
          
          echo "Smoke test passed!"

      - name: Smoke test - verify /health endpoint
        run: |
          ENDPOINT_IP="${{ needs.deploy.outputs.endpoint_ip }}"
          echo "Testing health endpoint at http://${ENDPOINT_IP}:8000/health"
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            "http://${ENDPOINT_IP}:8000/health")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Failed: Expected HTTP 200, got $HTTP_CODE"
            exit 1
          fi
          
          echo "Health check passed!"
